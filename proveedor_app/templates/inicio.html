{% extends "base.html" %}
{% load static %}

{% block title %}Inicio{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'inicio/inicio.css' %}">
{% endblock %}

{% block content %}
<!-- Animated particle background -->
<div id="particles-js"></div>

<!-- Floating content over the background -->
<div class="contenido-libre text-center">
    <img src="{% static 'media/imagenesLogin/logotitulo.png' %}" alt="Logo InnovaFix" class="logo mb-3">
    <h1>¡Hola, <span class="username">{{ user.username }}</span>! 👋</h1>
    <p class="lead">Bienvenido a <strong>InnovaFix</strong>, tu plataforma de gestión inteligente.</p>
    <p class="text-muted">Selecciona una opción del menú para comenzar.</p>
</div>
{% endblock %}
